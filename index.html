<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Result System</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    width: 400px;
  }

  h2 {
    text-align: center;
    color: #4b0082;
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
    color: #333;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 2px solid #667eea;
    border-radius: 8px;
    font-size: 16px;
    box-sizing: border-box;
  }

  input:focus {
    outline: none;
    border-color: #764ba2;
    box-shadow: 0 0 8px rgba(118, 75, 162, 0.4);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.03);
    background: linear-gradient(90deg, #764ba2, #667eea);
  }

  #result {
    margin-top: 20px;
    padding: 15px;
    background: #f3f4ff;
    border-left: 5px solid #667eea;
    border-radius: 8px;
    font-size: 18px;
  }

  .section {
    margin: 10px 0;
    color: #222;
    font-weight: bold;
  }
</style>
</head>
<body>
  <h2>Student Result System</h2>

  <label for="sub1">Subject 1 marks: </label>
  <input type="number" id="sub1" min="0" max="100" />

  <label for="sub2">Subject 2 marks: </label>
  <input type="number" id="sub2" min="0" max="100" />

  <label for="sub3">Subject 3 marks: </label>
  <input type="number" id="sub3" min="0" max="100" />

  <label for="sub4">Subject 4 marks: </label>
  <input type="number" id="sub4" min="0" max="100" />

  <label for="sub5">Subject 5 marks: </label>
  <input type="number" id="sub5" min="0" max="100" />

  <button onclick="calculateResult()">Calculate Result</button>

  <div id="result"></div>

  <script>
    function calculateResult() {
      const sub1 = parseFloat(document.getElementById("sub1").value);
      const sub2 = parseFloat(document.getElementById("sub2").value);
      const sub3 = parseFloat(document.getElementById("sub3").value);
      const sub4 = parseFloat(document.getElementById("sub4").value);
      const sub5 = parseFloat(document.getElementById("sub5").value);

      const resultDiv = document.getElementById("result");

      // Validate input
      const marks = [sub1, sub2, sub3, sub4, sub5];
      for (let m of marks) {
        if (m === undefined || m === null || m < 0 || m > 100 || !Number.isFinite(m)) {
          resultDiv.textContent = "Please enter valid marks (0–100) for all subjects.";
          return;
        }
      }

      const total = sub1 + sub2 + sub3 + sub4 + sub5;
      const percentage = total / 5;

      let classification;

      // if-else for classification
      if (percentage >= 75) {
        classification = "Distinction";
      } else if (percentage >= 60) {
        classification = "First Class";
      } else if (percentage >= 40) {
        classification = "Second Class";
      } else {
        classification = "Fail";
      }

      resultDiv.innerHTML =
        `<div class="section">Total: ${total}</div>` +
        `<div class="section">Percentage: ${percentage.toFixed(2)}%</div>` +
        `<div class="section">Result: ${classification}</div>`;
    }
  </script>
</body>
</html>
